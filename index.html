<html lang="en">

<meta charset="UTF-8">

<title>Banyan Residential — Resident Reviews Intelligence</title>
<style>

  :root {

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
  header { background: var(--ink); color: var(--paper); padding: 24px 48px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--gold); }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; letter-spacing: -0.02em; }
  header .subtitle { font-size: 0.72rem; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }
  .header-right { text-align: right; }
  .report-badge { background: var(--gold); color: var(--ink); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 12px; border-radius: 2px; display: inline-block; margin-bottom: 4px; }
  .header-count { font-size: 0.72rem; color: var(--muted); }

  /* TABS */
  #property-bar { background: var(--ink); padding: 0 48px; display: flex; overflow-x: auto; border-bottom: 1px solid #2a2a2a; }
  .prop-tab { color: var(--muted); font-size: 0.78rem; font-weight: 500; padding: 14px 18px; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.2s; }
  .prop-tab:hover { color: var(--paper); }
  .prop-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* DASHBOARD */
  #dashboard { max-width: 1200px; margin: 0 auto; padding: 32px 24px 60px; }

  /* SCORECARD */
  .scorecard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .scorecard-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; cursor: pointer; transition: box-shadow 0.2s, transform 0.15s; position: relative; overflow: hidden; }
  .scorecard-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .scorecard-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .scorecard-card.trend-up::before { background: var(--forest); }
  .scorecard-card.trend-down::before { background: var(--rust); }
  .scorecard-card.trend-flat::before { background: var(--gold); }
  .sc-name { font-size: 0.78rem; font-weight: 600; margin-bottom: 10px; color: var(--ink); }
  .sc-rating-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
  .sc-rating { font-family: 'DM Serif Display', serif; font-size: 2rem; line-height: 1; }
  .sc-stars { color: var(--gold); font-size: 0.8rem; }
  .sc-delta { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: auto; flex-shrink: 0; }
  .sc-delta.up { background: #e8f4ec; color: var(--forest); }
  .sc-delta.down { background: #faeee9; color: var(--rust); }
  .sc-delta.flat { background: var(--gold-light); color: #8a6a1a; }
  .sc-bar { display: flex; gap: 2px; height: 5px; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .sc-bar-seg { height: 100%; }
  .sc-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .sc-meta-item { font-size: 0.68rem; color: var(--muted); }
  .sc-meta-item strong { color: var(--ink); font-weight: 600; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border-radius: 6px; padding: 20px 22px; border: 1px solid var(--border); position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--gold); }
  .stat-card.pos::before { background: var(--forest); }
  .stat-card.neg::before { background: var(--rust); }
  .stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 1.9rem; line-height: 1; }
  .stat-sub { font-size: 0.75rem; margin-top: 5px; color: var(--muted); }
  .delta-up { color: var(--forest); font-weight: 600; }
  .delta-down { color: var(--rust); font-weight: 600; }

  /* INSIGHT BOX */
  .insight-box { background: var(--ink); color: var(--paper); border-radius: 6px; padding: 26px 30px; margin-bottom: 24px; position: relative; overflow: hidden; }
  .insight-box::after { content: '"'; font-family: 'DM Serif Display', serif; font-size: 9rem; color: rgba(201,168,76,0.1); position: absolute; top: -15px; right: 16px; line-height: 1; }
  .insight-label { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; font-weight: 700; }
  .insight-text { font-size: 0.9rem; line-height: 1.7; color: #e8e4dc; }
  .insight-drivers { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .driver-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
  .driver-pos { color: var(--gold); }
  .driver-neg { color: var(--rust); }
  .driver-text { font-size: 0.8rem; color: #d4d0c8; line-height: 1.5; }

  /* TWO COL */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .section { margin-bottom: 28px; }
  .section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
  .section-title { font-family: 'DM Serif Display', serif; font-size: 1.15rem; }
  .section-meta { font-size: 0.75rem; color: var(--muted); }

  /* CHARTS */
  .chart-card { background: var(--card); border-radius: 6px; padding: 20px; border: 1px solid var(--border); }
  .chart-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px; font-weight: 600; }

  /* THEMES */
  .theme-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .theme-pill { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 500; border: 1.5px solid transparent; }
  .theme-pill.positive { background: #e8f4ec; color: var(--forest); border-color: #b8d8c2; }
  .theme-pill.negative { background: #faeee9; color: var(--rust); border-color: #e8c4b8; }
  .theme-pill.neutral { background: var(--cream); color: var(--muted); border-color: var(--border); }
  .pill-count { background: rgba(0,0,0,0.08); border-radius: 10px; padding: 1px 7px; font-size: 0.68rem; font-weight: 700; }
  .theme-insights { display: flex; flex-wrap: wrap; gap: 8px; }
  .theme-insight-card { flex: 1; min-width: 200px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; }
  .ti-name { font-size: 0.72rem; font-weight: 600; margin-bottom: 3px; }
  .ti-text { font-size: 0.75rem; color: var(--muted); line-height: 1.4; }

  /* OPPORTUNITIES */
  .opp-list { display: flex; flex-direction: column; gap: 8px; }
  .opp-item { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 14px 18px; display: flex; align-items: flex-start; gap: 14px; }
  .opp-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; }
  .opp-icon.high { background: #faeee9; }
  .opp-icon.med { background: var(--gold-light); }
  .opp-icon.low { background: #e8f4ec; }
  .opp-body { flex: 1; }
  .opp-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 3px; }
  .opp-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
  .opp-badge { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 9px; border-radius: 2px; flex-shrink: 0; margin-top: 2px; }
  .opp-badge.high { background: #faeee9; color: var(--rust); }
  .opp-badge.med { background: var(--gold-light); color: #8a6a1a; }
  .opp-badge.low { background: #e8f4ec; color: var(--forest); }

  /* REVIEWS */
  .review-list { display: flex; flex-direction: column; gap: 10px; }
  .review-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 14px 18px; border-left: 4px solid var(--border); }
  .review-card.r5 { border-left-color: var(--forest); }
  .review-card.r4 { border-left-color: #7cbb8a; }
  .review-card.r3 { border-left-color: var(--gold); }
  .review-card.r2 { border-left-color: #e8956b; }
  .review-card.r1 { border-left-color: var(--rust); }
  .review-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .stars { color: var(--gold); font-size: 0.82rem; }
  .review-author { font-size: 0.75rem; font-weight: 600; }
  .review-date { font-size: 0.72rem; color: var(--muted); }
  .review-body { font-size: 0.82rem; line-height: 1.6; color: #3a3733; }

  /* TIP BOX */
  .tip-box { background: var(--gold-light); border: 1.5px solid var(--gold); border-radius: 6px; padding: 16px 20px; margin-bottom: 24px; }
  .tip-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8a6a1a; margin-bottom: 6px; }
  .tip-text { font-size: 0.84rem; line-height: 1.6; color: #4a3a0a; }

  .divider { border: none; border-top: 1px solid var(--border); margin-bottom: 24px; }
  .month-badge { background: var(--ink); color: var(--gold); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 2px; display: inline-block; margin-bottom: 16px; }

  @media (max-width: 768px) {
    header { padding: 18px; }
    #property-bar { padding: 0 12px; }
    #dashboard { padding: 20px 14px 40px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .insight-drivers { grid-template-columns: 1fr; }
  }
</style>
</head>

// ─── STATE ────────────────────────────────────────────────────────────────────
let activeProperty = 'ALL';
let chartInstances = {};

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('headerCount').textContent = BANYAN_DATA.totalReviews + ' reviews · ' + BANYAN_DATA.properties.length + ' properties';
  buildTabs();
  renderView('ALL');
});

function buildTabs() {
  const bar = document.getElementById('property-bar');
  const tabs = ['ALL', ...BANYAN_DATA.properties];
  bar.innerHTML = tabs.map(p =>
    `<div class="prop-tab ${p === 'ALL' ? 'active' : ''}" onclick="switchProp('${p.replace(/'/g,"\'")}')">
      ${p === 'ALL' ? '📊 All Properties' : p}
    </div>`
  ).join('');
}

function switchProp(prop) {
  activeProperty = prop;
  document.querySelectorAll('.prop-tab').forEach(t => {
    const label = t.textContent.trim().replace('📊 All Properties','ALL');
    t.classList.toggle('active', label === prop || (prop === 'ALL' && t.textContent.includes('All Properties')));
  });
  // Destroy existing charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
  renderView(prop);
}

// ─── PORTFOLIO VIEW ───────────────────────────────────────────────────────────
function renderView(prop) {
  const dash = document.getElementById('dashboard');
  if (prop === 'ALL') {
    dash.innerHTML = renderPortfolio();
  } else {
    dash.innerHTML = renderProperty(prop);
  }
  setTimeout(renderCharts, 50);
}

function renderPortfolio() {
  // Portfolio stats
  const allProps = BANYAN_DATA.properties;
  const totalReviews = BANYAN_DATA.totalReviews;
  const allRatings = allProps.flatMap(p => {
    const st = BANYAN_DATA.props[p];
    const avg = st.avg;
    return Array(st.total).fill(avg);
  });
  const portAvg = allProps.reduce((s,p) => s + BANYAN_DATA.props[p].avg * BANYAN_DATA.props[p].total, 0) / totalReviews;
  const totalFive = allProps.reduce((s,p) => s + BANYAN_DATA.props[p].five, 0);
  const totalNeg = allProps.reduce((s,p) => s + BANYAN_DATA.props[p].one + BANYAN_DATA.props[p].two, 0);
  const pctFive = Math.round(totalFive/totalReviews*100);
  const pctNeg = Math.round(totalNeg/totalReviews*100);
  const trendingUp = allProps.filter(p => BANYAN_DATA.props[p].mom > 0.05).length;
  const trendingDown = allProps.filter(p => BANYAN_DATA.props[p].mom < -0.05).length;

  // Scorecard cards
  const scorecards = allProps.map(prop => {
    const st = BANYAN_DATA.props[prop];
    const total = st.total;
    const mom = st.mom;
    let trendClass = 'trend-flat', deltaClass = 'flat', deltaText = '— Stable';
    if (mom > 0.05) { trendClass = 'trend-up'; deltaClass = 'up'; deltaText = '↑ +' + mom.toFixed(2) + ' MoM'; }
    if (mom < -0.05) { trendClass = 'trend-down'; deltaClass = 'down'; deltaText = '↓ ' + mom.toFixed(2) + ' MoM'; }
    const starsStr = '★'.repeat(Math.round(st.avg)) + '☆'.repeat(5-Math.round(st.avg));
    const pf = Math.round(st.five/total*100);
    const pn = Math.round((st.one+st.two)/total*100);
    const bars = [
      {pct: total ? st.five/total*100 : 0, color: '#2d5a3d'},
      {pct: total ? st.four/total*100 : 0, color: '#7cbb8a'},
      {pct: total ? st.three/total*100 : 0, color: '#c9a84c'},
      {pct: total ? st.two/total*100 : 0, color: '#e8956b'},
      {pct: total ? st.one/total*100 : 0, color: '#c2522b'},
    ];
    return `<div class="scorecard-card ${trendClass}" onclick="switchProp('${prop.replace(/'/g,"\'")}')">
      <div class="sc-name">${prop}</div>
      <div class="sc-rating-row">
        <div class="sc-rating">${st.avg.toFixed(1)}</div>
        <div class="sc-stars">${starsStr}</div>
        <span class="sc-delta ${deltaClass}">${deltaText}</span>
      </div>
      <div class="sc-bar">${bars.map(b => `<div class="sc-bar-seg" style="width:${b.pct}%;background:${b.color}"></div>`).join('')}</div>
      <div class="sc-meta">
        <div class="sc-meta-item"><strong>${total}</strong> reviews</div>
        <div class="sc-meta-item"><strong style="color:#2d5a3d">${pf}%</strong> 5★</div>
        <div class="sc-meta-item"><strong style="color:#c2522b">${pn}%</strong> 1-2★</div>
        <div class="sc-meta-item" style="margin-left:auto;font-size:0.65rem;color:var(--muted)">Drill in →</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Portfolio Scorecard</div>
        <div class="section-meta">Click any property to drill in</div>
      </div>
      <div class="month-badge">${BANYAN_DATA.reportMonth} Report</div>
      <div class="scorecard-grid">${scorecards}</div>
    </div>
    <hr class="divider">

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Portfolio Avg Rating</div>
        <div class="stat-value">${portAvg.toFixed(2)} <span style="font-size:1rem;color:var(--gold)">★</span></div>
        <div class="stat-sub">${totalReviews} total reviews</div>
      </div>
      <div class="stat-card pos">
        <div class="stat-label">5-Star Reviews</div>
        <div class="stat-value">${totalFive}</div>
        <div class="stat-sub delta-up">↑ ${pctFive}% of total</div>
      </div>
      <div class="stat-card neg">
        <div class="stat-label">1–2 Star Reviews</div>
        <div class="stat-value">${totalNeg}</div>
        <div class="stat-sub delta-down">↓ ${pctNeg}% need attention</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">MoM Trend</div>
        <div class="stat-value">${trendingUp}<span style="font-size:1rem;color:var(--forest)">↑</span> ${trendingDown}<span style="font-size:1rem;color:var(--rust)">↓</span></div>
        <div class="stat-sub">properties trending up / down</div>
      </div>
    </div>

    <div class="two-col section">
      <div class="chart-card">
        <div class="chart-title">Portfolio Avg Rating by Month</div>
        <canvas id="portTrendChart" height="180"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Properties by Avg Rating</div>
        <canvas id="portBarChart" height="180"></canvas>
      </div>
    </div>`;
}

// ─── PROPERTY VIEW ────────────────────────────────────────────────────────────
function renderProperty(prop) {
  const st = BANYAN_DATA.props[prop];
  const total = st.total;
  const pctFive = Math.round(st.five/total*100);
  const pctNeg = Math.round((st.one+st.two)/total*100);
  const mom = st.mom;
  let momHTML = `<span style="color:var(--muted)">— Stable</span>`;
  if (mom > 0.05) momHTML = `<span class="delta-up">↑ +${mom.toFixed(2)} vs last month</span>`;
  if (mom < -0.05) momHTML = `<span class="delta-down">↓ ${mom.toFixed(2)} vs last month</span>`;
  const dist = [1,2,3,4,5].map(s => {
    const key = ['one','two','three','four','five'][s-1];
    return st[key];
  });

  const reviewsHTML = st.samples.map(r => {
    const stars = '★'.repeat(Math.round(r.rating)) + '☆'.repeat(5-Math.round(r.rating));
    return `<div class="review-card r${Math.round(r.rating)}">
      <div class="review-meta">
        <span class="stars">${stars}</span>
        <span class="review-author">${r.author || 'Anonymous'}</span>
        <span class="review-date">${r.date || ''}</span>
      </div>
      <div class="review-body">${r.text}</div>
    </div>`;
  }).join('');

  return `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Avg Rating</div>
        <div class="stat-value">${st.avg.toFixed(2)} <span style="font-size:1rem;color:var(--gold)">★</span></div>
        <div class="stat-sub">${momHTML}</div>
      </div>
      <div class="stat-card pos">
        <div class="stat-label">Total Reviews</div>
        <div class="stat-value">${total}</div>
        <div class="stat-sub">${BANYAN_DATA.reportMonth}</div>
      </div>
      <div class="stat-card pos">
        <div class="stat-label">5-Star Reviews</div>
        <div class="stat-value">${st.five}</div>
        <div class="stat-sub delta-up">↑ ${pctFive}% of total</div>
      </div>
      <div class="stat-card neg">
        <div class="stat-label">1–2 Star Reviews</div>
        <div class="stat-value">${st.one + st.two}</div>
        <div class="stat-sub delta-down">↓ ${pctNeg}% need attention</div>
      </div>
    </div>

    <div class="insight-box">
      <div class="insight-label">AI Executive Summary — ${prop}</div>
      <div class="insight-text">${st.summary}</div>
      <div class="insight-drivers">
        <div>
          <div class="driver-label driver-pos">Top Positive Driver</div>
          <div class="driver-text">${st.topPositive}</div>
        </div>
        <div>
          <div class="driver-label driver-neg">Top Negative Driver</div>
          <div class="driver-text">${st.topNegative}</div>
        </div>
      </div>
    </div>

    <div class="section two-col">
      <div class="chart-card">
        <div class="chart-title">Avg Rating by Month</div>
        <canvas id="trendChart" height="180"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Star Distribution</div>
        <canvas id="distChart" height="180"></canvas>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Review Themes</div>
        <div class="section-meta">AI-extracted from ${total} reviews</div>
      </div>
      <div class="theme-grid">
        ${st.themes.map(t => `
          <div class="theme-pill ${t.type}">
            ${t.type === 'positive' ? '✓' : t.type === 'negative' ? '✗' : '○'} ${t.name}
            <span class="pill-count">${t.count}</span>
          </div>`).join('')}
      </div>
      <div class="theme-insights">
        ${st.themes.map(t => `
          <div class="theme-insight-card">
            <div class="ti-name">${t.name}</div>
            <div class="ti-text">${t.insight}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Operational Opportunities</div>
        <div class="section-meta">Prioritized by impact on NOI & renewals</div>
      </div>
      <div class="opp-list">
        ${st.opportunities.map(o => `
          <div class="opp-item">
            <div class="opp-icon ${o.priority}">${o.icon}</div>
            <div class="opp-body">
              <div class="opp-title">${o.title}</div>
              <div class="opp-desc">${o.description}</div>
            </div>
            <span class="opp-badge ${o.priority}">${o.priority}</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="tip-box">
      <div class="tip-label">💬 Response Strategy</div>
      <div class="tip-text">${st.responseTip}</div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Recent Reviews</div>
        <div class="section-meta">Sample across rating spectrum</div>
      </div>
      <div class="review-list">${reviewsHTML}</div>
    </div>`;
}

// ─── CHARTS ───────────────────────────────────────────────────────────────────
function renderCharts() {
  if (activeProperty === 'ALL') {
    // Portfolio trend
    const tCtx = document.getElementById('portTrendChart');
    if (tCtx) {
      chartInstances.portTrend = new Chart(tCtx, {
        type: 'line',
        data: {
          labels: BANYAN_DATA.portMonths.map(m => { const [y,mo] = m.split('-'); return new Date(y,mo-1).toLocaleString('default',{month:'short',year:'2-digit'}); }),
          datasets: [{
            label: 'Avg Rating', data: BANYAN_DATA.portAvgs,
            borderColor: '#c9a84c', backgroundColor: 'rgba(201,168,76,0.07)',
            borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#c9a84c',
            tension: 0.4, fill: true
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false } },
          scales: { y: { min: 1, max: 5, ticks: { stepSize: 1, font: { size: 10 } }, grid: { color: '#ede9e1' } },
            x: { ticks: { font: { size: 10 } }, grid: { display: false } } } }
      });
    }
    // Property bar chart
    const bCtx = document.getElementById('portBarChart');
    if (bCtx) {
      const props = BANYAN_DATA.properties;
      const avgs = props.map(p => BANYAN_DATA.props[p].avg);
      const colors = avgs.map(a => a >= 4.5 ? '#2d5a3d' : a >= 4.0 ? '#c9a84c' : '#c2522b');
      chartInstances.portBar = new Chart(bCtx, {
        type: 'bar',
        data: {
          labels: props.map(p => p.replace('Banyan ','').replace(' Apartments','').replace(' Single Family Homes','')),
          datasets: [{ data: avgs, backgroundColor: colors, borderRadius: 3 }]
        },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } },
          scales: { x: { min: 3, max: 5, ticks: { font: { size: 10 } }, grid: { color: '#ede9e1' } },
            y: { ticks: { font: { size: 9 } }, grid: { display: false } } } }
      });
    }
  } else {
    const st = BANYAN_DATA.props[activeProperty];
    const tCtx = document.getElementById('trendChart');
    if (tCtx && st.monthlyLabels.length) {
      chartInstances.trend = new Chart(tCtx, {
        type: 'line',
        data: {
          labels: st.monthlyLabels.map(m => { const [y,mo] = m.split('-'); return new Date(y,mo-1).toLocaleString('default',{month:'short',year:'2-digit'}); }),
          datasets: [{
            label: 'Avg Rating', data: st.monthlyAvgs,
            borderColor: '#c9a84c', backgroundColor: 'rgba(201,168,76,0.07)',
            borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#c9a84c', tension: 0.4, fill: true
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false } },
          scales: { y: { min: 1, max: 5, ticks: { stepSize: 1, font: { size: 10 } }, grid: { color: '#ede9e1' } },
            x: { ticks: { font: { size: 10 } }, grid: { display: false } } } }
      });
    }
    const dCtx = document.getElementById('distChart');
    if (dCtx) {
      chartInstances.dist = new Chart(dCtx, {
        type: 'bar',
        data: {
          labels: ['1★','2★','3★','4★','5★'],
          datasets: [{ data: [st.one, st.two, st.three, st.four, st.five],
            backgroundColor: ['#c2522b','#e8956b','#c9a84c','#7cbb8a','#2d5a3d'], borderRadius: 3 }]
        },
        options: { responsive: true, plugins: { legend: { display: false } },
          scales: { y: { ticks: { font: { size: 10 } }, grid: { color: '#ede9e1' } },
            x: { ticks: { font: { size: 11 } }, grid: { display: false } } } }
      });
    }
  }
}
</script>
</body>
</html>
